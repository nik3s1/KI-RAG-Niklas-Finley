# ============================================================
# TAG 3: Open WebUI mit externem Cloud-LLM (z.B. Groq)
# ============================================================
# API-Key eintragen! Modell mit grossem Kontext waehlen,
# z.B. llama-3.1-8b-instant (128k Token) -> loest RAG-Limit.
# ============================================================

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ki-webui-cloud
    ports:
      - "3000:8080"
    environment:
      - ENABLE_OLLAMA_API=false
      - OPENAI_API_BASE_URL=https://api.groq.com/openai/v1
      - OPENAI_API_KEY=HIER_GROQ_API_KEY_EINTRAGEN
      - WEBUI_SECRET_KEY=ki-projekt-2025
    volumes:
      - webui-data:/app/backend/data
    restart: unless-stopped

volumes:
  webui-data:
